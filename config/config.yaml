app:
  name: "cv-card-demo"
  version: "0.1.0"
  initial_state: "BOOT"

server:
  host: "0.0.0.0"
  port: 8000
  ui_static_dir: "./app/web"
  ui_events_interval_s: 0.33
  live_stream_jpeg_quality: 65
  live_capture_min_interval_s: 0.12

boot:
  next_state: "INIT_CAM"
  max_boot_duration_s: 10
  allow_degraded_wled: true

error_safe:
  # ERROR_SAFE is no longer a dead-end: it waits a backing-off interval and then
  # retries the camera via INIT_CAM so the booth self-heals when a disconnected
  # camera is reconnected. Set auto_recover: false to keep it terminal.
  auto_recover: true
  retry_interval_s: 8
  max_retry_interval_s: 60

workspace:
  card:
    mode: "manual_rect"
    source_frame: "live"
    rect_px:
      x: 220
      y: 220
      width: 664
      height: 423
    output_size_px:
      width: 540
      height: 344
    score_axis: "x"
    invert_score_axis: false

  hand:
    mode: "manual_rect"
    source_frame: "live"
    rect_px:
      x: 191
      y: 200
      width: 731
      height: 493
    output_size_px:
      width: 540
      height: 364

detector:
  # "classical" is the working detector on this device: the only model file is
  # the stock COCO yolov8n.pt, which has no "business_card" class and therefore
  # can never produce a card candidate. Switch back to "yolo" only with a model
  # actually trained on business cards.
  type: "classical"
  enabled: true
  business_card_label: "business_card"
  require_business_card_candidate: true
  loop_hz:
    default: 30
    IDLE_NO_CARD: 4
    CANDIDATE_DETECTED: 8
    TRACKING: 3
    SNAPSHOT: 0

  yolo:
    # Available models:
    # - "./models/yolov8n.pt"              (stock COCO, no business_card class)
    # - "./models/yolov8_visiting_card.pt" (trained on visiting cards, has "visiting_card" label)
    # - "./models/YOLO-id-card.pt"         (trained on ID cards, only 2 classes: with/without strap)
    model_path: "./models/yolov8_visiting_card.pt"
    confidence: 0.25
    fallback_to_classical: true
    device: "auto"   # auto -> cuda:0 when available, else cpu (or set "cpu"/"cuda:0")

  preprocessing:
    grayscale: true
    blur_kernel: 5
    threshold_mode: "otsu"
    canny_enabled: false
    morphology_enabled: true
    morphology_kernel_size: 5
    morphology_close_iterations: 1
    morphology_open_iterations: 1

  contour_filter:
    min_area_px: 1500
    max_area_ratio: 0.8
    min_aspect_ratio: 1.2
    max_aspect_ratio: 2.2
    min_rectangularity: 0.76
    min_solidity: 0.90
    require_quadrilateral: true
    border_margin_px: 10

  confidence:
    min_confidence: 0.45
    # Workspace is 664x423 on the live frame. A ~90x50mm business card at
    # ~300mm workspace width scales to ~200x70px ≈ 14000 px² in workspace.
    # Min/max tolerance +/- 50% area variance (e.g. angle, distance).
    expected_card_area_px: 14000
    min_area_similarity: 0.15
    target_aspect_ratio: 1.65
    aspect_tolerance: 0.55
    weight_area: 0.35
    weight_aspect: 0.35
    weight_rectangularity: 0.30

tracking:
  candidate_required_frames: 3
  candidate_max_lost_frames: 2
  tracking_max_lost_duration_s: 0.5
  poll_interval_s: 0.033
  debug_log_every_frame: false

  hand:
    enabled: true
    model: "mediapipe_hands"
    # Run MediaPipe in a background thread and keep each call cheap so the
    # tracking loop and live stream stay responsive when a hand appears.
    # MediaPipe's process() holds the GIL, so model_complexity + process_max_dim
    # + detect_hz matter more than the thread itself.
    async: true
    detect_hz: 30.0          # max hand-detection rate (snapshot guard only)
    model_complexity: 0     # 0 = lite landmark model (much faster on CPU)
    process_max_dim: 256    # downscale the hand ROI before process()
    min_detection_confidence: 0.5
    min_tracking_confidence: 0.5
    max_proxy_velocity_norm_per_s: 2.0
    max_distance_from_card_norm: 0.35
    workspace_margin_px: 20
    fallback_order:
      - "index_middle_proxy"
      - "index_only_proxy"
      - "palm_center_proxy"

  fusion:
    card_to_hand:
      min_hand_stable_frames: 2
      hand_takeover_blend_s: 0.10
      max_initial_offset_norm: 0.35

    hand_to_card:
      min_card_stable_frames: 3
      reacquire_tolerance_norm: 0.04
      ambiguous_tolerance_norm: 0.12
      allow_displayed_score_drift: false
      allow_blend_to_card_pose: false
      validate_timeout_s: 0.25

    lost_hold:
      # Hold the last confirmed score through brief card occlusion (e.g. a
      # hand reaching over the card) so tracking does not bounce back to
      # IDLE_NO_CARD and reset the questionnaire session.
      max_duration_s: 1.5

    smoothing:
      score_ema_alpha: 0.35

questionnaire:
  questions:
    - id: "experience"
      label: "How was your experience?"
      min_label: "0"
      max_label: "10"
      min_motion_norm: 0.03
      small_motion_epsilon: 0.005
      active_motion_duration_s: 1.0
      idle_before_countdown_s: 3.0
      countdown_s: 3.0
      snapshot_on_confirm: true

    - id: "team"
      label: "How was the team?"
      min_label: "0"
      max_label: "10"
      min_motion_norm: 0.03
      small_motion_epsilon: 0.005
      active_motion_duration_s: 1.0
      idle_before_countdown_s: 3.0
      countdown_s: 3.0
      snapshot_on_confirm: true

    - id: "solution_fit"
      label: "How strong is the solution fit?"
      min_label: "0"
      max_label: "10"
      min_motion_norm: 0.03
      small_motion_epsilon: 0.005
      active_motion_duration_s: 1.0
      idle_before_countdown_s: 3.0
      countdown_s: 3.0
      snapshot_on_confirm: true

identity:
  precheck:
    enabled: true
    idle_loop_hz: 1.0
    candidate_loop_hz: 2.0
    max_duration_s: 1.0
    min_card_confidence: 0.35
    require_ocr_for_known_match: true
    allow_vector_match: false

  vector:
    review_threshold: 0.85

snapshot:
  output_dir: "./data/snapshots"
  crop_padding_px: 70
  max_save_edge_px: 1920

persistence:
  enabled: true
  sqlite_path: "./data/cv_card_demo.sqlite3"

ocr:
  llm:
    enabled: false

vector:
  enabled: true
  qdrant_path: "./data/qdrant"
  text:
    model: "sentence-transformers/all-MiniLM-L6-v2"
  image:
    model: "clip-ViT-B-32"

logging:
  level: "INFO"
  file: "./logs/app.log"
  log_to_console: true
  log_to_file: true

perf:
  # Always-on timing instrumentation. Every log_interval_s the backend logs a
  # PERF line with per-stage p50/p95/max (read, resize, encode_clean,
  # card_detect, hand, fusion, questionnaire, publish, debug_encode,
  # loop_total, ui_snapshot_build). A stage whose max exceeds spike_warn_ms is
  # logged at WARNING so periodic latency spikes are easy to grep.
  log_interval_s: 5.0
  spike_warn_ms: 80.0

camera:
  init_in_boot: false
  preferred_backend: "v4l2"
  device_index: 0
  width: 4096
  height: 2160
  fps: 30
  fourcc: "MJPG"
  retry_attempts: 3
  # Drives the IDLE live-view refresh rate (0.1 ≈ 10 Hz preview). Detection
  # load is capped independently via detector.loop_hz.
  idle_poll_interval: 0.05

  live_processing:
    enabled: true
    width: 1080
    height: 720

wled:
  # Optional LED output. Mirrors the displayed score onto a WLED LED bar.
  # Leave disabled until the ESP32/WLED is reachable. When the Jetson joins the
  # ESP's own WLED access point ("WLED-AP"), WLED's AP default address is
  # http://4.3.2.1 — set host accordingly.
  enabled: false
  host: ""                 # e.g. "http://4.3.2.1" (ESP AP) or "http://192.168.4.50"
  endpoint: "/json/state"
  led_count: 14
  brightness: 160
  timeout_ms: 300
  update_hz: 20            # max LED refresh rate (>= this interval between posts)
  force_refresh_s: 2.0     # resend unchanged state at least this often
  min_leds_when_visible: 1 # light at least N LEDs while a score is shown
  fail_mode: "optional"

  idle:
    brightness: 80         # idle/no-card: LEDs off at this brightness

  colors:
    low_rgb: [255, 20, 20]   # low score  -> red
    mid_rgb: [0, 80, 255]    # mid score  -> blue
    high_rgb: [0, 255, 170]  # high score -> cyan-green
