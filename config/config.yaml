app:
  name: "cv-card-demo"
  version: "0.1.0"
  initial_state: "BOOT"

server:
  host: "0.0.0.0"
  port: 8000
  ui_static_dir: "./app/web"
  ui_events_interval_s: 0.33
  live_stream_jpeg_quality: 65

boot:
  next_state: "INIT_CAM"
  max_boot_duration_s: 10
  allow_degraded_wled: true

workspace:
  card:
    mode: "manual_rect"
    source_frame: "live"
    rect_px:
      x: 390
      y: 330
      width: 1180
      height: 635
    output_size_px:
      width: 960
      height: 516
    score_axis: "x"
    invert_score_axis: false

  hand:
    mode: "manual_rect"
    source_frame: "live"
    rect_px:
      x: 340
      y: 300
      width: 1300
      height: 740
    output_size_px:
      width: 960
      height: 546

detector:
  type: "classical"
  enabled: true
  business_card_label: "business_card"
  require_business_card_candidate: true
  loop_hz:
    default: 4
    IDLE_NO_CARD: 4
    CANDIDATE_DETECTED: 8
    TRACKING: 3
    SNAPSHOT: 0

  yolo:
    model_path: ""
    confidence: 0.25

  preprocessing:
    grayscale: true
    blur_kernel: 5
    threshold_mode: "otsu"
    canny_enabled: false
    morphology_enabled: true
    morphology_kernel_size: 5
    morphology_close_iterations: 1
    morphology_open_iterations: 1

  contour_filter:
    min_area_px: 1500
    max_area_ratio: 0.8
    min_aspect_ratio: 1.2
    max_aspect_ratio: 2.2

  confidence:
    min_confidence: 0.35
    expected_card_area_px: 3200
    target_aspect_ratio: 1.65
    aspect_tolerance: 0.55
    weight_area: 0.35
    weight_aspect: 0.35
    weight_rectangularity: 0.30

tracking:
  candidate_required_frames: 3
  candidate_max_lost_frames: 2
  tracking_max_lost_duration_s: 0.5
  poll_interval_s: 0.033

  hand:
    enabled: true
    model: "mediapipe_hands"
    min_detection_confidence: 0.5
    min_tracking_confidence: 0.5
    max_proxy_velocity_norm_per_s: 2.0
    max_distance_from_card_norm: 0.35
    workspace_margin_px: 20
    fallback_order:
      - "index_middle_proxy"
      - "index_only_proxy"
      - "palm_center_proxy"

  fusion:
    card_to_hand:
      min_hand_stable_frames: 2
      hand_takeover_blend_s: 0.10
      max_initial_offset_norm: 0.35

    hand_to_card:
      min_card_stable_frames: 3
      reacquire_tolerance_norm: 0.04
      ambiguous_tolerance_norm: 0.12
      allow_displayed_score_drift: false
      allow_blend_to_card_pose: false
      validate_timeout_s: 0.25

    lost_hold:
      max_duration_s: 0.5

    smoothing:
      score_ema_alpha: 0.35

questionnaire:
  questions:
    - id: "experience"
      label: "How was your experience?"
      min_label: "0"
      max_label: "10"
      min_motion_norm: 0.03
      small_motion_epsilon: 0.005
      active_motion_duration_s: 1.0
      idle_before_countdown_s: 3.0
      countdown_s: 3.0
      snapshot_on_confirm: true

    - id: "team"
      label: "How was the team?"
      min_label: "0"
      max_label: "10"
      min_motion_norm: 0.03
      small_motion_epsilon: 0.005
      active_motion_duration_s: 1.0
      idle_before_countdown_s: 3.0
      countdown_s: 3.0
      snapshot_on_confirm: true

    - id: "solution_fit"
      label: "How strong is the solution fit?"
      min_label: "0"
      max_label: "10"
      min_motion_norm: 0.03
      small_motion_epsilon: 0.005
      active_motion_duration_s: 1.0
      idle_before_countdown_s: 3.0
      countdown_s: 3.0
      snapshot_on_confirm: true

identity:
  precheck:
    enabled: true
    idle_loop_hz: 1.0
    candidate_loop_hz: 2.0
    max_duration_s: 1.0
    min_card_confidence: 0.35
    require_ocr_for_known_match: true
    allow_vector_match: false

  vector:
    review_threshold: 0.85

snapshot:
  output_dir: "./data/snapshots"
  crop_padding_px: 70

persistence:
  enabled: true
  sqlite_path: "./data/cv_card_demo.sqlite3"

ocr:
  llm:
    enabled: false

vector:
  enabled: true
  qdrant_path: "./data/qdrant"
  text:
    model: "sentence-transformers/all-MiniLM-L6-v2"
  image:
    model: "clip-ViT-B-32"

logging:
  level: "INFO"
  file: "./logs/app.log"
  log_to_console: true
  log_to_file: true

camera:
  init_in_boot: false
  preferred_backend: "v4l2"
  device_index: 0
  width: 4096
  height: 2160
  fps: 30
  fourcc: "MJPG"
  retry_attempts: 3
  idle_poll_interval: 0.5

  live_processing:
    enabled: true
    width: 1920
    height: 1080

wled:
  enabled: false
  host: ""
  timeout_ms: 300
  fail_mode: "optional"
